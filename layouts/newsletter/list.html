{{ define "main" }}
<div class="custom-list-container" style="background-color: #030712; color: #ffffff; min-height: 100vh; padding: 3rem 1rem; font-family: system-ui, -apple-system, sans-serif;">
  <div style="max-width: 1280px; margin: 0 auto;">
    
    <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 2.5rem; color: #ffffff; letter-spacing: -0.02em;">
      {{ .Title }}
    </h1>

    <style>
      /* Targets the card containers */
      .list-content-wrapper .hextra-cards, 
      .list-content-wrapper div[class*="grid"] {
        gap: 1.5rem !important;
      }
      
      /* Transforms each individual card to your custom theme colors */
      .list-content-wrapper a[href*="/ai-tools/"] {
        background-color: #060b18 !important;
        border: 1px solid #111e38 !important;
        border-radius: 0.75rem !important;
        padding: 1.5rem !important;
        transition: all 0.2s ease-in-out !important;
      }

      /* Hover glow effect */
      .list-content-wrapper a[href*="/ai-tools/"]:hover {
        border-color: #1d4ed8 !important;
        box-shadow: 0 0 15px rgba(29, 78, 216, 0.2) !important;
        background-color: #081022 !important;
      }

      /* Forces text colors inside cards to match your mockup */
      .list-content-wrapper a[href*="/ai-tools/"] title,
      .list-content-wrapper a[href*="/ai-tools/"] div,
      .list-content-wrapper a[href*="/ai-tools/"] span {
        color: #ffffff !important;
      }

      .list-content-wrapper a[href*="/ai-tools/"] p,
      .list-content-wrapper a[href*="/ai-tools/"] subtitle {
        color: #94a3b8 !important;
      }
    </style>

    <div class="list-content-wrapper">
      {{ .Content }}
    </div>

  </div>
</div>
{{ end }}
