<div style="padding:48px 24px; border-top:1px solid #1a3a5c;">
  <div style="max-width:1200px; margin:0 auto;">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <h2 style="font-size:20px; font-weight:600; color:#ffffff; margin:0;">Industries using AI &amp; SaaS</h2>
      <a href="/industries/" style="font-size:13px; color:#9CA3AF; text-decoration:none;">View all →</a>
    </div>

    <div style="overflow-x:auto; padding-bottom:8px;">
      <div style="display:flex; gap:10px; width:max-content;">
        {{ range hugo.Data.industries }}
        <a href="{{ .url }}" style="width:160px; flex-shrink:0; background:#111827; border:1px solid #1a3a5c; border-radius:12px; padding:14px 12px; display:flex; flex-direction:column; gap:7px; text-decoration:none;">
          <div style="width:36px; height:36px; border-radius:8px; background:{{ .iconBg }}; display:flex; align-items:center; justify-content:center; font-size:18px;">
            <i class="ti {{ .icon }}" style="color:{{ .iconColor }};"></i>
          </div>
          {{ if .isNew }}
          <span style="display:inline-block; font-size:10px; font-weight:600; padding:1px 7px; border-radius:99px; background:{{ .iconBg }}; color:{{ .iconColor }}; width:fit-content;">New</span>
          {{ end }}
          <p style="font-size:13px; font-weight:600; color:#ffffff; margin:0; line-height:1.3;">{{ .name }}</p>
          <p style="font-size:11px; color:#9CA3AF; margin:0; line-height:1.4;">{{ .description }}</p>
          <p style="font-size:11px; color:#4B5563; margin:0; margin-top:auto; padding-top:6px; border-top:1px solid #1a3a5c;">{{ .toolCount }} tools · {{ .saasCount }} SaaS</p>
        </a>
        {{ end }}
      </div>
    </div>

  </div>
</div>
