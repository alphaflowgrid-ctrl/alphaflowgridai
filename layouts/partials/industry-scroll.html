<div style="padding:48px 24px; border-top:1px solid #1a3a5c;">
  <div style="max-width:1200px; margin:0 auto;">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <h2 style="font-size:20px; font-weight:600; color:#ffffff; margin:0;">Industries using AI &amp; SaaS</h2>
      <a href="/industries/" style="font-size:13px; color:#00ccff; text-decoration:none;">View all →</a>
    </div>

    <div class="ind-scroll-wrap" style="overflow-x:auto; padding-bottom:8px;">
      <div style="display:flex; gap:10px; width:max-content;">
        {{ range hugo.Data.industries }}
        <a href="{{ .url }}" style="width:160px; flex-shrink:0; background:#0a1a2e; border:0.5px solid #1a3a5c; border-radius:10px; padding:16px 14px; display:flex; flex-direction:column; gap:8px; text-decoration:none; transition:border-color 0.2s;" onmouseover="this.style.borderColor='#00ccff'" onmouseout="this.style.borderColor='#1a3a5c'">
          <div style="width:38px; height:38px; border-radius:8px; background:#0d2137; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;">
            <i class="ti {{ .icon }}" style="color:#00ccff;"></i>
          </div>
          {{ if .isNew }}
          <span style="display:inline-block; font-size:10px; font-weight:600; padding:1px 7px; border-radius:99px; background:#0d2137; color:#00ccff; border:0.5px solid #1a3a5c; width:fit-content;">New</span>
          {{ end }}
          <p style="font-size:13px; font-weight:600; color:#ffffff; margin:0; line-height:1.3;">{{ .name }}</p>
          <p style="font-size:11px; color:#7ca4cc; margin:0; line-height:1.4;">{{ .description }}</p>
          <p style="font-size:11px; color:#00ccff; margin:0; margin-top:auto; padding-top:6px; border-top:0.5px solid #1a3a5c;">Explore tools →</p>
        </a>
        {{ end }}
      </div>
    </div>

  </div>
</div>

<style>
  .ind-scroll-wrap::-webkit-scrollbar { height: 4px; }
  .ind-scroll-wrap::-webkit-scrollbar-track { background: #0a1a2e; border-radius: 4px; }
  .ind-scroll-wrap::-webkit-scrollbar-thumb { background: #1a3a5c; border-radius: 4px; }
  .ind-scroll-wrap::-webkit-scrollbar-thumb:hover { background: #00ccff; }
</style>
