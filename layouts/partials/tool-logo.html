<!-- This is a smart container that automatically fetches logos -->
<div style="width:{{ .size | default "56" }}px; height:{{ .size | default "56" }}px; border-radius:{{ .radius | default "12" }}px; background:#ffffff; border:0.5px solid #1a3a5c; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden;">
  {{ $logoSource := .context.Params.website | default .context.Params.affiliate_link }}
  
  {{ if $logoSource }}
    {{ $domain := (urls.Parse $logoSource).Host }}
    <img src="https://www.google.com/s2/favicons?domain={{ $domain }}&sz=128" 
         alt="{{ .context.Title }} Logo" 
         style="width:100%; height:100%; object-fit:contain; padding:20%;"
         onerror="this.parentElement.style.background='#0066ff'; this.style.display='none'; this.nextElementSibling.style.display='flex';">
    
    <!-- FALLBACK: Exactly your original initials style -->
    <div style="display:none; width:100%; height:100%; align-items:center; justify-content:center; font-size:{{ .fs | default "20" }}px; color:#fff; font-weight:700; background:#0066ff;">
      {{ substr .context.Title 0 2 | upper }}
    </div>
  {{ else }}
    <div style="width:100%; height:100%; background:#0066ff; display:flex; align-items:center; justify-content:center; font-size:{{ .fs | default "20" }}px; color:#fff; font-weight:700;">
      {{ substr .context.Title 0 2 | upper }}
    </div>
  {{ end }}
</div>
