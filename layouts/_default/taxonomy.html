{{ define "main" }}
<div style="max-width:1200px; margin:0 auto; padding:48px 24px;">
  <h1 style="font-size:28px; font-weight:700; color:#ffffff; margin-bottom:24px;">{{ .Title }}</h1>
  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:14px;">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" style="background:#111827; border:1px solid #1a3a5c; border-radius:12px; padding:16px; text-decoration:none;">
      <p style="font-size:15px; font-weight:600; color:#ffffff; margin:0;">{{ .Title }}</p>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
