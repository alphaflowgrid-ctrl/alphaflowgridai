baseURL = 'https://alphaflowgridai.com/'
defaultContentLanguage = 'en'
title = 'AlphaFlowGridAI'

enableRobotsTXT = true
canonifyURLs = false

[pagination]
  pagerSize = 24

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

[params]
  description = "Smart Tools. Better Productivity. Your ultimate directory for AI Tools and SaaS products."

[params.author]
  name = "AlphaFlowGridAI"
  email = "alphaflowgrid@gmail.com"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false

[[menu.main]]
  name = "AI Tools"
  url = "/ai-tools/"
  weight = 1

[[menu.main]]
  name = "SaaS"
  url = "/saas/"
  weight = 2

[[menu.main]]
  name = "Free Tools"
  url = "/free-tools/"
  weight = 3

[[menu.main]]
  name = "Compare"
  url = "/compare/"
  weight = 4

[[menu.main]]
  name = "Blog"
  url = "/blog/"
  weight = 5

[[menu.main]]
  name = "Newsletter"
  url = "/newsletter/"
  weight = 6

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "JSON"]
  taxonomy = ["HTML"]
  term = ["HTML"]

